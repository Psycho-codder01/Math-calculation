<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC Math Master Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#1e3a8a,#020617 45%),
    radial-gradient(circle at bottom right,#7c3aed,#020617 40%);
    color:white;
    padding:20px;
    overflow-x:hidden;
}

/* Glow Background */

.glow{
    position:fixed;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.5;
    z-index:-1;
    animation:float 8s infinite alternate;
}

.glow1{
    background:#00f0ff;
    top:-100px;
    left:-100px;
}

.glow2{
    background:#ff00c8;
    bottom:-100px;
    right:-100px;
}

@keyframes float{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(40px);
    }
}

.container{
    max-width:1100px;
    margin:auto;
}

/* Header */

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:60px;
    font-weight:700;
    background:linear-gradient(to right,#38bdf8,#c084fc,#f472b6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    margin-top:10px;
    color:#cbd5e1;
    font-size:18px;
}

/* Stats */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:25px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
}

.card h2{
    margin-bottom:12px;
    font-size:22px;
}

.card p{
    font-size:38px;
    font-weight:700;
    color:#38bdf8;
}

/* Buttons */

.categories{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    margin-bottom:25px;
}

.cat-btn{
    padding:14px 22px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    transition:0.3s;
}

.cat-btn:hover{
    transform:scale(1.08);
    background:linear-gradient(45deg,#06b6d4,#8b5cf6);
}

.active{
    background:linear-gradient(45deg,#06b6d4,#8b5cf6);
}

/* Quiz Box */

.quiz-box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:35px;
    padding:40px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.question{
    font-size:52px;
    text-align:center;
    margin-bottom:40px;
    font-weight:700;
}

/* Options */

.options{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
}

.option-btn{
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:22px;
    cursor:pointer;
    color:white;
    font-weight:600;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.option-btn:hover{
    transform:translateY(-5px) scale(1.05);
    background:linear-gradient(135deg,#06b6d4,#7c3aed);
}

/* Result */

.result{
    text-align:center;
    margin-top:30px;
    font-size:28px;
    font-weight:600;
    min-height:45px;
}

.correct{
    color:#22c55e;
}

.wrong{
    color:#ef4444;
}

/* Next Button */

.next-btn{
    display:block;
    margin:35px auto 0;
    border:none;
    padding:16px 40px;
    border-radius:60px;
    background:linear-gradient(45deg,#06b6d4,#9333ea);
    color:white;
    cursor:pointer;
    font-size:20px;
    font-weight:700;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(139,92,246,0.5);
}

.next-btn:hover{
    transform:scale(1.08);
}

/* Footer */

.footer{
    text-align:center;
    margin-top:30px;
    color:#cbd5e1;
}

/* Mobile */

@media(max-width:700px){

    .header h1{
        font-size:40px;
    }

    .question{
        font-size:34px;
    }

    .quiz-box{
        padding:25px;
    }

    .option-btn{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<div class="header">
    <h1>SSC MATH MASTER PRO</h1>
    <p>Practice Squares, Cubes, Tables, Fractions & Percentages</p>
</div>

<!-- Stats -->

<div class="stats">

<div class="card">
    <h2>⭐ Score</h2>
    <p id="score">0</p>
</div>

<div class="card">
    <h2>✅ Correct</h2>
    <p id="correct">0</p>
</div>

<div class="card">
    <h2>❌ Wrong</h2>
    <p id="wrong">0</p>
</div>

</div>

<!-- Categories -->

<div class="categories">

<button class="cat-btn active" onclick="changeType('mixed',this)">
🎲 Mixed
</button>

<button class="cat-btn" onclick="changeType('square',this)">
Squares
</button>

<button class="cat-btn" onclick="changeType('cube',this)">
Cubes
</button>

<button class="cat-btn" onclick="changeType('table',this)">
Tables
</button>

<button class="cat-btn" onclick="changeType('reverse',this)">
Reverse
</button>

<button class="cat-btn" onclick="changeType('fractionToPercent',this)">
Fraction → %
</button>

<button class="cat-btn" onclick="changeType('percentToFraction',this)">
% → Fraction
</button>

</div>

<!-- Difficulty -->

<div class="categories">

<button class="cat-btn active" onclick="changeDifficulty('easy',this)">
🟢 Easy
</button>

<button class="cat-btn" onclick="changeDifficulty('medium',this)">
🟡 Medium
</button>

<button class="cat-btn" onclick="changeDifficulty('hard',this)">
🔴 Hard
</button>

</div>

<!-- Quiz -->

<div class="quiz-box">

<div class="question" id="question">
Loading...
</div>

<div class="options" id="options"></div>

<div class="result" id="result"></div>

<button class="next-btn" onclick="generateQuestion()">
Next Question →
</button>

</div>

<div class="footer">
Made for SSC & Railway Aspirants 🚀
</div>

</div>

<script>

let currentType = "mixed";
let difficulty = "easy";
let currentAnswer;

let score = 0;
let correct = 0;
let wrong = 0;

function random(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function updateStats(){

    document.getElementById("score").innerHTML = score;
    document.getElementById("correct").innerHTML = correct;
    document.getElementById("wrong").innerHTML = wrong;
}

function changeType(type,btn){

    currentType = type;

    document.querySelectorAll(".categories:first-of-type .cat-btn")
    .forEach(b=>{
        b.classList.remove("active");
    });

    btn.classList.add("active");

    generateQuestion();
}

function changeDifficulty(level,btn){

    difficulty = level;

    document.querySelectorAll(".categories:nth-of-type(2) .cat-btn")
    .forEach(b=>{
        b.classList.remove("active");
    });

    btn.classList.add("active");

    generateQuestion();
}

function gcd(a,b){

    while(b!==0){

        let t=b;
        b=a%b;
        a=t;
    }

    return a;
}

function generateQuestion(){

    document.getElementById("result").innerHTML="";

    let types = [
        "square",
        "cube",
        "table",
        "reverse",
        "fractionToPercent",
        "percentToFraction"
    ];

    let activeType = currentType;

    if(currentType==="mixed"){

        activeType = types[random(0,types.length-1)];
    }

    let q="";
    let ans="";

    let min1,max1;

    if(difficulty==="easy"){

        min1=1;
        max1=10;

    }else if(difficulty==="medium"){

        min1=10;
        max1=20;

    }else{

        min1=20;
        max1=50;
    }

    /* Squares */

    if(activeType==="square"){

        let n=random(min1,max1);

        q=`${n}² = ?`;

        ans=n*n;
    }

    /* Cubes */

    else if(activeType==="cube"){

        let limit = difficulty==="easy" ? 5 :
                    difficulty==="medium" ? 10 : 20;

        let n=random(1,limit);

        q=`${n}³ = ?`;

        ans=n*n*n;
    }

    /* Tables */

    else if(activeType==="table"){

        let a=random(min1,max1);
        let b=random(2,20);

        q=`${a} × ${b} = ?`;

        ans=a*b;
    }

    /* Reverse */

    else if(activeType==="reverse"){

        let a=random(2,20);
        let b=random(2,20);

        q=`${a*b} = ?`;

        ans=`${a} × ${b}`;
    }

    /* Fraction → Percent */

    else if(activeType==="fractionToPercent"){

        let d=random(2,20);
        let n=random(1,d-1);

        q=`${n}/${d} = ? %`;

        ans=((n/d)*100).toFixed(2)+"%";
    }

    /* Percent → Fraction */

    else if(activeType==="percentToFraction"){

        let p=random(1,20)*5;

        q=`${p}% = ?`;

        let g=gcd(p,100);

        ans=`${p/g}/${100/g}`;
    }

    currentAnswer=ans;

    document.getElementById("question").innerHTML=q;

    let options=[];

    if(typeof ans==="number"){

        options=[ans];

        while(options.length<4){

            let fake=ans+random(-50,50);

            if(fake>0 && !options.includes(fake)){

                options.push(fake);
            }
        }

    }else{

        options=[ans];

        while(options.length<4){

            let fake="";

            if(activeType==="reverse"){

                fake=`${random(2,20)} × ${random(2,20)}`;

            }else{

                fake=`${random(1,20)}/${random(2,20)}`;
            }

            if(!options.includes(fake)){

                options.push(fake);
            }
        }
    }

    options=shuffle(options);

    let box=document.getElementById("options");

    box.innerHTML="";

    options.forEach(op=>{

        let btn=document.createElement("button");

        btn.className="option-btn";

        btn.innerHTML=op;

        btn.onclick=()=>checkAnswer(op);

        box.appendChild(btn);

    });

}

function checkAnswer(selected){

    let result=document.getElementById("result");

    if(String(selected)===String(currentAnswer)){

        score+=5;
        correct++;

        result.innerHTML="✅ Correct Answer!";
        result.className="result correct";

    }else{

        wrong++;

        result.innerHTML=`❌ Wrong! Correct Answer: ${currentAnswer}`;
        result.className="result wrong";
    }

    updateStats();
}

generateQuestion();

</script>

</body>
</html>
